{% load django_bootstrap5 %}
{% load django_htmx %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="description" content="Vita - Frank OS" />
        <meta name="author" content="Frank Matranga" />
        <title>Vita - Frank OS</title>
        {% bootstrap_css %}
        {% bootstrap_javascript %}
        {% htmx_script %}
        <script type="module" src="{% static 'js/navigation.js' %}"></script>
        <script type="module" src="{% static 'js/toasts.js' %}"></script>
        <script type="module" src="{% static 'js/voice.js' %}"></script>
    </head>
    <body class="bg-light d-flex flex-column vh-100"
          data-csrftoken="{{ csrf_token }}"
          hx-headers='{"x-csrftoken": "{{ csrf_token }}"}'>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">Vita</a>
                <button class="navbar-toggler"
                        type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#navbar-collapse">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbar-collapse">
                    <div class="navbar-nav me-auto">
                        <a class="nav-link" href="{% url 'task_board' %}">Tasks</a>
                        <a class="nav-link" href="{% url 'routine_list' %}">Routines</a>
                        <a class="nav-link" href="#">Inbox</a>
                    </div>
                    <div class="navbar-nav">
                        <form method="post" action="{% url 'logout' %}">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-link nav-link text-white">Logout</button>
                        </form>
                    </div>
                </div>
            </div>
        </nav>
        <main class="flex-1 flex-grow-1">
            {% block content %}
            {% endblock content %}
        </main>
        <div class="toast-container position-fixed bottom-0 end-0 p-3">
            <template id="task-toast-template">
                <div class="toast" role="alert" aria-live="assertive" aria-atomic="true">
                    <div class="toast-header">
                        <strong class="me-auto toast-title"></strong>
                    </div>
                    <div class="toast-body"></div>
                </div>
            </template>
        </div>
    </body>
</html>
