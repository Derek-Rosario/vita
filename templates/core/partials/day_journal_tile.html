<div class="card h-100 shadow-sm" id="day-journal-tile">
  <div class="card-header d-flex align-items-center">
    <svg width="18"
         height="18"
         viewBox="0 0 24 24"
         fill="currentColor"
         class="me-2 text-success"
         aria-hidden="true">
      <path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11z" />
    </svg>
    <h5 class="mb-0">Journal</h5>
    {% if saved %}<span class="badge bg-success ms-auto">Saved</span>{% endif %}
  </div>
  <div class="card-body d-flex flex-column">
    <form hx-post="{% url 'day_overview_journal' %}?date={{ selected_date|date:'Y-m-d' }}"
          hx-target="#day-journal-tile"
          hx-swap="outerHTML">
      {% csrf_token %}
      <input type="hidden" name="date" value="{{ selected_date|date:'Y-m-d' }}">
      <div class="mb-2">
        <input type="text"
               name="title"
               class="form-control form-control-sm"
               placeholder="Title (optional)"
               value="{{ journal_entry.title|default:'' }}"
               aria-label="Journal title">
      </div>
      <div class="mb-3">
        <textarea name="content_markdown"
                  class="form-control"
                  rows="8"
                  placeholder="Write your thoughts for {{ selected_date|date:'N j' }}…"
                  aria-label="Journal entry content"
                  style="resize: vertical">{{ journal_entry.content_markdown|default:'' }}</textarea>
      </div>
      <button type="submit" class="btn btn-success btn-sm w-100">
        {% if journal_entry %}Update entry{% else %}Save entry{% endif %}
      </button>
    </form>
    {% if journal_entry %}
      <div class="text-muted small mt-2 text-end">
        Last updated {{ journal_entry.updated_at|date:"M j, g:i a" }}
      </div>
    {% endif %}
  </div>
</div>
