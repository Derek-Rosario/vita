{% load django_bootstrap5 %}
<div class="card shadow-sm" id="task-form-card">
  <div class="card-header bg-light sticky-top d-flex justify-content-between align-items-center">
    <div>
      <p class="text-uppercase text-muted small mb-0">
        {% if task.routine %}
          Routine Task
        {% else %}
          Task
        {% endif %}
      </p>
      <h2 class="h5 mb-0">{{ task.title }}</h2>
    </div>
    <div id="task-save-indicator"
         class="spinner-border htmx-indicator"
         role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
    <div>
      <button id="mark-done-button"
              class="btn btn-success"
              type="button"
              hx-post="{% url 'mark_task_done' task.id %}">Mark Done</button>
    </div>
  </div>
  <div class="card-body">
    {% if task.routine %}
      <div class="alert alert-info" role="alert">
        This task is part of routine <a href="{% url 'routine_edit' task.routine.id %}">{{ task.routine.name }}</a>.
      </div>
    {% endif %}
    <div id="task-autosave-status" class="small text-muted" aria-live="polite"></div>
    <form id="task-form"
          method="post"
          action="{% url 'edit_task' task.id %}"
          hx-indicator="#task-save-indicator"
          hx-post="{% url 'edit_task' task.id %}"
          hx-trigger="change"
          hx-target="#task-autosave-status"
          hx-swap="innerHTML"
          hx-include="#task-form"
          hx-push-url="false"
          class="d-flex flex-column gap-3">
      {% bootstrap_form form layout="horizontal" %}
      <div class="d-flex justify-content-end gap-2">
        <a class="btn btn-outline-secondary" href="{% url 'task_board' %}">Back to Board</a>
      </div>
    </form>
  </div>
</div>
