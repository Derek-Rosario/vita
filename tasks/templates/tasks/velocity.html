{% extends "base.html" %}
{% block title %}
    Velocity
{% endblock title %}
{% block content %}
    <div class="container py-4">
        <h2 class="mb-3">Velocity</h2>
        <p class="text-muted">Weekly throughput based on completed tasks.</p>
        <div class="row mb-3">
            <div class="col-auto">
                <label for="weeks" class="form-label">Weeks</label>
                <select id="weeks" class="form-select">
                    <option value="8">8</option>
                    <option value="12" selected>12</option>
                    <option value="24">24</option>
                    <option value="52">52</option>
                </select>
            </div>
            <div class="col-auto align-self-end">
                <button id="apply" class="btn btn-primary">Apply</button>
            </div>
        </div>
        <canvas id="velocityChart" height="120"></canvas>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script>
(function() {
  const ctx = document.getElementById('velocityChart');
  let chart = null;

  async function loadData() {
    const weeks = document.getElementById('weeks').value;
    const params = new URLSearchParams({ weeks });

    const resp = await fetch(`{% url 'task_velocity_data' %}?` + params.toString());
    const data = await resp.json();

    const labels = data.labels;

    const datasets = [
      {
        label: 'Tasks Completed',
        data: data.tasks_completed,
        borderColor: '#198754',
        backgroundColor: 'rgba(25,135,84,0.1)',
        tension: 0.2,
        yAxisID: 'y1',
      },
      {
        label: 'Tasks Cancelled',
        data: data.tasks_cancelled,
        borderColor: '#dc3545',
        backgroundColor: 'rgba(220,53,69,0.1)',
        borderDash: [5, 5],
        tension: 0.2,
        yAxisID: 'y1',
      },
      {
        label: 'Tasks Created',
        data: data.tasks_created,
        borderColor: '#88888888',
        backgroundColor: 'rgba(34,34,34,0.1)',
        tension: 0.2,
        yAxisID: 'y1',
      },
      {
        label: 'Weight Completed',
        data: data.weight_completed,
        borderColor: '#0d6efd',
        backgroundColor: 'rgba(13,110,253,0.1)',
        tension: 0.2,
        yAxisID: 'y2',
      }
    ];

    const config = {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { position: 'top' },
          tooltip: { enabled: true }
        },
        scales: {
          
          y1: {
            position: 'left',
            title: { display: true, text: 'Count' },
            beginAtZero: true,
            grid: { drawOnChartArea: false },
          },
          y2: {
            position: 'right',
            title: { display: true, text: 'Weight' },
            beginAtZero: true,
            grid: { drawOnChartArea: false },
          },
          x: {
            ticks: {
              autoSkip: true,
              maxRotation: 0,
              callback: function(value, index) {
                return labels[index];
              }
            }
          }
        }
      }
    };

    if (chart) chart.destroy();
    chart = new Chart(ctx, config);
  }

  document.getElementById('apply').addEventListener('click', loadData);
  loadData();
})();
    </script>
{% endblock content %}
