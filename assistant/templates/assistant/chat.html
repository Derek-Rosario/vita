{% extends "base.html" %}
{% block title %}
    Assistant
{% endblock title %}
{% block content %}
    <div class="container py-4" style="max-width: 720px;">
        <h1 class="h3 mb-3">Assistant</h1>
        <div class="card shadow-sm">
            <div class="card-body">
                <p class="mb-3">The assistant is now available as a floating widget on every page.</p>
                <button type="button"
                        class="btn btn-primary"
                        data-assistant-open
                        data-assistant-focus-input>Open assistant</button>
            </div>
        </div>
    </div>
{% endblock content %}
