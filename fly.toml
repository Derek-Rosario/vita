# fly.toml app configuration file generated for vita on 2025-12-10T01:54:54-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'vita'
primary_region = 'ewr'
console_command = '/code/manage.py shell'

[processes]
  app = 'python -m daphne vita.asgi:application'
  worker = '/code/manage.py db_worker'
  cron = "supercronic /code/crontab"

[build]

[env]
  PORT = '8000'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[[statics]]
  guest_path = '/code/static'
  url_prefix = '/static/'

[deploy]
  release_command = "/code/manage.py migrate --noinput"

[[services]]
  processes = ["app"]