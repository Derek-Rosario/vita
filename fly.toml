# fly.toml app configuration file generated for vita on 2025-12-10T01:54:54-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'vita'
primary_region = 'ewr'
console_command = '/code/manage.py shell'

[processes]
  app = 'sh /code/start.sh'

[build]

[env]
  PORT = '8000'
  DB_PATH = '/data/db.sqlite3'

[mounts]
  source = 'vita_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[[statics]]
  guest_path = '/code/static'
  url_prefix = '/static/'
