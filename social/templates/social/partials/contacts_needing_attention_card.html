<div class="card">
    <div class="card-header">Contacts Needing Attention</div>
    <div class="list-group">
        {% for contact in contacts_needing_attention %}
            <a href="{% url 'admin:social_contact_change' contact.pk %}"
               class="list-group-item list-group-item-action d-flex gap-3 justify-content-between align-items-center">
                <span>{{ contact.name }}</span>
                <div class="progress flex-grow-1" role="progressbar">
                    <div class="progress-bar progress-bar-striped progress-bar-animated {% if contact.strength < 40 %}bg-danger{% elif contact.strength < 70 %}bg-warning{% else %}bg-success{% endif %}"
                         style="width: {{ contact.strength }}%">{{ contact.strength }}%</div>
                </div>
                <button type="button"
                        class="btn btn-sm btn-success"
                        data-bs-toggle="modal"
                        data-bs-target="#log-contact-touchpoint-modal"
                        hx-target="#log-contact-touchpoint-modal"
                        hx-swap="innerHTML"
                        hx-get="{% url 'social:log_contact_touchpoint_modal' contact.pk %}">Log Contact</button>
            </a>
        {% empty %}
            <div class="list-group-item">All caught up! No contacts need attention.</div>
        {% endfor %}
    </div>
</div>
