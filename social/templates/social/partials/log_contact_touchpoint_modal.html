{% load django_bootstrap5 %}
<div class="modal-dialog">
    <div class="modal-content">
        <div class="modal-header">
            <h5 class="modal-title">Log Contact Touchpoint with {{ contact.name }}</h5>
            <button type="button"
                    class="btn-close"
                    data-bs-dismiss="modal"
                    aria-label="Close"></button>
        </div>
        <div class="modal-body">
            <!-- Dismiss modal on successful submission -->
            <form id="log-contact-touchpoint-form"
                  hx-post="{% url 'social:log_contact_touchpoint_modal' contact.pk %}">
                {% bootstrap_form form %}
            </form>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            <button form="log-contact-touchpoint-form"
                    type="submit"
                    data-bs-dismiss="modal"
                    class="btn btn-primary">Save changes</button>
        </div>
    </div>
</div>
